<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Take Care</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #scene {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(to bottom, #87CEEB 0%, #b8e0f7 38%, #d4efc0 62%, #a8d576 100%);
      position: relative;
      overflow: hidden;
      font-family: 'Apple Garamond', 'Garamond', 'EB Garamond', Georgia, serif;
    }

    #sun {
      position: absolute;
      top: 48px;
      right: 120px;
      width: 86px;
      height: 86px;
      background: #FFD700;
      border-radius: 50%;
      box-shadow:
        0 0 0 18px rgba(255,215,0,0.20),
        0 0 0 36px rgba(255,215,0,0.09),
        0 0 0 56px rgba(255,215,0,0.04);
    }

    .cloud {
      position: absolute;
      background: #fff;
      border-radius: 50px;
      opacity: 0.84;
    }

    #text-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -62%);
      text-align: center;
      z-index: 10;
      pointer-events: none;
    }

    #take-care {
      font-size: clamp(52px, 10vw, 110px);
      font-weight: 300;
      color: #722F37;
      letter-spacing: 0.04em;
      line-height: 1;
      font-family: 'Apple Garamond', 'Garamond', 'EB Garamond', Georgia, serif;
      text-shadow: 1px 2px 12px rgba(255,245,200,0.75);
    }

    #sub {
      font-size: clamp(13px, 2vw, 20px);
      font-weight: 300;
      color: #8a5a44;
      letter-spacing: 0.22em;
      margin-top: 14px;
      font-family: 'Apple Garamond', 'Garamond', 'EB Garamond', Georgia, serif;
    }

    canvas#confetti-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 20;
    }

    svg#scene-svg {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div id="scene">

    <div id="sun"></div>

    <div class="cloud" style="width:130px;height:38px;top:70px;left:80px;">
      <div style="position:absolute;width:60px;height:60px;background:#fff;border-radius:50%;top:-26px;left:18px;"></div>
      <div style="position:absolute;width:42px;height:42px;background:#fff;border-radius:50%;top:-16px;left:62px;"></div>
    </div>
    <div class="cloud" style="width:90px;height:28px;top:110px;left:300px;opacity:0.62;">
      <div style="position:absolute;width:42px;height:42px;background:#fff;border-radius:50%;top:-18px;left:12px;"></div>
      <div style="position:absolute;width:30px;height:30px;background:#fff;border-radius:50%;top:-12px;left:42px;"></div>
    </div>
    <div class="cloud" style="width:100px;height:30px;top:55px;left:55%;opacity:0.5;">
      <div style="position:absolute;width:46px;height:46px;background:#fff;border-radius:50%;top:-20px;left:14px;"></div>
      <div style="position:absolute;width:34px;height:34px;background:#fff;border-radius:50%;top:-14px;left:46px;"></div>
    </div>

    <div id="text-center">
      <div id="take-care">Take Care</div>
      <div id="sub">made with love, by sierra ♡</div>
    </div>

    <svg id="scene-svg" viewBox="0 0 900 240" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="130" width="900" height="110" fill="#5a9e2f"/>
      <rect x="0" y="155" width="900" height="85" fill="#4a8c20"/>
      <g id="grass-blades"></g>
      <g id="sunflowers"></g>
    </svg>

    <canvas id="confetti-canvas"></canvas>
  </div>

  <script>
  (function () {
    const NS = 'http://www.w3.org/2000/svg';
    const svg = document.getElementById('scene-svg');

    function grassBlade(x, h, color) {
      const el = document.createElementNS(NS, 'path');
      const sway = (Math.random() - 0.5) * 20;
      el.setAttribute('d', `M${x},162 Q${x + sway},${162 - h / 2} ${x + sway * 1.5},${162 - h}`);
      el.setAttribute('fill', 'none');
      el.setAttribute('stroke', color);
      el.setAttribute('stroke-width', 2 + Math.random() * 2.2);
      el.setAttribute('stroke-linecap', 'round');
      return el;
    }

    const grassGroup = document.getElementById('grass-blades');
    const grassColors = ['#3d7a18','#4f9a22','#62b02e','#2e6010','#6abf34','#538c28','#7acc3a'];
    for (let i = 0; i < 320; i++) {
      grassGroup.appendChild(grassBlade(
        Math.random() * 900,
        20 + Math.random() * 42,
        grassColors[Math.floor(Math.random() * grassColors.length)]
      ));
    }

    function drawSunflower(x, stemH, scale) {
      const g = document.createElementNS(NS, 'g');
      const baseY = 162;
      const topY = baseY - stemH;

      const stem = document.createElementNS(NS, 'line');
      stem.setAttribute('x1', x); stem.setAttribute('y1', baseY);
      stem.setAttribute('x2', x); stem.setAttribute('y2', topY);
      stem.setAttribute('stroke', '#4a7c1e');
      stem.setAttribute('stroke-width', 3.2 * scale);
      stem.setAttribute('stroke-linecap', 'round');
      g.appendChild(stem);

      if (stemH > 42) {
        const lx = x - 15 * scale, ly = topY + stemH * 0.44;
        const leaf1 = document.createElementNS(NS, 'ellipse');
        leaf1.setAttribute('cx', lx); leaf1.setAttribute('cy', ly);
        leaf1.setAttribute('rx', 14 * scale); leaf1.setAttribute('ry', 6 * scale);
        leaf1.setAttribute('fill', '#5a9e2f');
        leaf1.setAttribute('transform', `rotate(-38,${lx},${ly})`);
        g.appendChild(leaf1);

        const lx2 = x + 13 * scale, ly2 = ly + 16;
        const leaf2 = document.createElementNS(NS, 'ellipse');
        leaf2.setAttribute('cx', lx2); leaf2.setAttribute('cy', ly2);
        leaf2.setAttribute('rx', 12 * scale); leaf2.setAttribute('ry', 5 * scale);
        leaf2.setAttribute('fill', '#4a8c20');
        leaf2.setAttribute('transform', `rotate(32,${lx2},${ly2})`);
        g.appendChild(leaf2);
      }

      const petalCount = 14;
      const cr = 9 * scale;
      const pr = 13 * scale;
      for (let i = 0; i < petalCount; i++) {
        const angle = (i / petalCount) * Math.PI * 2;
        const px = x + Math.cos(angle) * (cr + pr * 0.6);
        const py = topY + Math.sin(angle) * (cr + pr * 0.6);
        const petal = document.createElementNS(NS, 'ellipse');
        petal.setAttribute('cx', px); petal.setAttribute('cy', py);
        petal.setAttribute('rx', pr * 0.52); petal.setAttribute('ry', pr);
        petal.setAttribute('fill', i % 2 === 0 ? '#FFD700' : '#FFC200');
        petal.setAttribute('transform', `rotate(${(angle * 180 / Math.PI) + 90},${px},${py})`);
        g.appendChild(petal);
      }

      const core = document.createElementNS(NS, 'circle');
      core.setAttribute('cx', x); core.setAttribute('cy', topY);
      core.setAttribute('r', cr); core.setAttribute('fill', '#3e2000');
      g.appendChild(core);

      [[-3, -2], [2.5, 2.5], [-1, 3], [3, -1]].forEach(([dx, dy]) => {
        const s = document.createElementNS(NS, 'circle');
        s.setAttribute('cx', x + dx * scale); s.setAttribute('cy', topY + dy * scale);
        s.setAttribute('r', 1.8 * scale); s.setAttribute('fill', '#6b3a00');
        g.appendChild(s);
      });

      return g;
    }

    const sfGroup = document.getElementById('sunflowers');
    const sfData = [
      {x:30,  h:70, s:1.05},
      {x:95,  h:52, s:0.82},
      {x:158, h:88, s:1.28},
      {x:220, h:46, s:0.74},
      {x:282, h:78, s:1.12},
      {x:345, h:58, s:0.88},
      {x:408, h:95, s:1.38},
      {x:468, h:50, s:0.79},
      {x:530, h:83, s:1.18},
      {x:592, h:56, s:0.86},
      {x:652, h:76, s:1.08},
      {x:710, h:44, s:0.72},
      {x:768, h:86, s:1.22},
      {x:828, h:60, s:0.93},
      {x:878, h:70, s:1.0}
    ];
    sfData.forEach(d => sfGroup.appendChild(drawSunflower(d.x, d.h, d.s)));

    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const COLORS = [
      '#FFD700','#FF6B6B','#FF9F1C','#A8DADC','#E63946',
      '#F4D35E','#EE9B00','#94D2BD','#F9C74F','#90BE6D',
      '#F8961E','#FF85A1','#FFC8DD','#FFAFCC','#BDE0FE'
    ];

    const pieces = Array.from({length: 130}, () => ({
      x: Math.random() * window.innerWidth,
      y: -Math.random() * window.innerHeight,
      w: 7 + Math.random() * 10,
      h: 4 + Math.random() * 6,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      speed: 1.1 + Math.random() * 2.4,
      drift: (Math.random() - 0.5) * 1.3,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.09,
      shape: Math.random() > 0.42 ? 'rect' : 'circle'
    }));

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pieces.forEach(p => {
        p.y += p.speed;
        p.x += p.drift;
        p.rot += p.rotSpeed;
        if (p.y > canvas.height + 20) { p.y = -14; p.x = Math.random() * canvas.width; }
        if (p.x > canvas.width + 10) p.x = -10;
        if (p.x < -10) p.x = canvas.width + 10;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = 0.85;
        if (p.shape === 'rect') {
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      });
      requestAnimationFrame(animate);
    }
    animate();
  })();
  </script>
</body>
</html>
